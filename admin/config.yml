backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: de

# Direkte HTML-Bearbeitung aller Seiten
collections:

  - name: "business"
    label: "Business-Seiten"
    files:
      - label: "Business Übersicht"
        name: "business"
        file: "business.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Zusammenarbeit"
        name: "zusammenarbeit"
        file: "zusammenarbeit.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Businessfotos"
        name: "businessfotos"
        file: "businessfotos.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Videos & Imagefilme"
        name: "videos"
        file: "videos-und-filme.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Social-Media-Content"
        name: "social"
        file: "social-media-content.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Standortmarketing"
        name: "standortmarketing"
        file: "standortmarketing.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Referenzen"
        name: "referenzen"
        file: "referenzen.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

  - name: "privat"
    label: "Private Shootings"
    files:
      - label: "Privatkunden Übersicht"
        name: "privatkunden"
        file: "privatkunden.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Portraits"
        name: "portraits"
        file: "portraits.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Bewerbungsfotos"
        name: "bewerbungsfotos"
        file: "bewerbungsfotos.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Hochzeitsfotos"
        name: "hochzeitsfotos"
        file: "hochzeitsfotos.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Familienfotos"
        name: "familienfotos"
        file: "familienfotos.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Paarfotos"
        name: "paarfotos"
        file: "paarfotos.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Akt & Erotikfotos"
        name: "aktfotos"
        file: "aktfotos.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

  - name: "info"
    label: "Info-Seiten"
    files:
      - label: "Über mich"
        name: "ueber-mich"
        file: "ueber-mich.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Portfolio / Galerie"
        name: "galerie"
        file: "galerie.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "FAQ"
        name: "faq"
        file: "faq.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Kontakt"
        name: "kontakt"
        file: "kontakt.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

      - label: "Homepage"
        name: "index"
        file: "index.html"
        fields:
          - { label: "Seiteninhalt (HTML)", name: "body", widget: "code", default_language: "html", allow_language_selection: false, output_code_only: true }

  - name: "blog"
    label: "Blog"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime" }
      - { label: "Kategorie", name: "category", widget: "select", options: ["Business", "Portrait", "Hochzeit", "Tipps", "Behind the Scenes"] }
      - { label: "Titelbild", name: "thumbnail", widget: "image", required: false }
      - { label: "Kurzbeschreibung", name: "excerpt", widget: "text" }
      - { label: "Inhalt", name: "body", widget: "markdown" }
